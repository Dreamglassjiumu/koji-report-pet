<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koji Pet</title>
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <main id="petShell" class="pet-shell pet-idle" aria-live="polite">
    <section class="pet-bubble-wrap" aria-label="Koji 提示">
      <div id="petBubble" class="pet-bubble">来了，今天干啥了？</div>
      <div id="petLabel" class="pet-label">待机</div>
    </section>

    <button id="petBody" class="pet-body" type="button" aria-label="单击快速记录，双击打开完整面板，拖动移动 Koji">
      <span id="petFace" class="pet-face">🐾</span>
    </button>

    <form id="quickRecordForm" class="quick-record-panel" hidden>
      <strong>说吧，今天干啥了？</strong>
      <textarea id="quickRecordText" rows="3" placeholder="例如：提交第三批警察现场语音台词审核"></textarea>
      <label for="quickRecordTag">项目标签</label>
      <select id="quickRecordTag"></select>
      <div class="quick-actions">
        <button id="quickSubmitBtn" type="submit">记录</button>
        <button id="quickCancelBtn" type="button">取消</button>
        <button id="quickOpenBtn" type="button">打开面板</button>
      </div>
    </form>
  </main>

  <script src="pet.js" defer></script>
</body>
</html>
